<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #ffffff;
        }

        h2 {
            text-align: center;
            color: #0073e6;
            margin: 20px 0;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-weight: bolder;
        }

        .container {
            width: 90%;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 200px;
            gap: 15px;

        }

        .item {
            background-color: white;
            border-radius: 4px;
            box-shadow: 6px 6px 8px rgba(0, 0, 0, 0.15);
        }

        .item1 {
            background-color: white;
            border-radius: 4px;
            box-shadow: 6px 6px 8px rgba(0, 0, 0, 0.15);
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }

        .item img:hover{
            transform: scale(1.05);
        }

        .container .item:nth-child(5) img {
            grid-row-start: 2;
            grid-row-end: 4;
        }
    </style>
</head>

<body>

    <h2>Assignment 9: Task-3 Gallery</h2>

    <div class="container">

        <div class="item">
            <img src="car1.avif" alt="Waste">
        </div>

        </div>

        <div class="item">
            <img src="car3.webp" alt="Waste">
        </div>

        <div class="item">
            <img src="car4.avif" alt="Waste">
        </div>
        <div class="item">
            <img src="car5.jpg" alt="Waste">
        </div>
        <div class="item">
            <img src="car6.webp" alt="Waste">
        </div>
        <div class="item">
            <img src="car7.jpg" alt="Waste">
        </div>
        <div class="item">
            <img src="car8.jpg" alt="Waste">
        </div>
        <div class="item">
            <img src="car9.webp" alt="Waste">
        </div>


    </div>
</body>

</html>
